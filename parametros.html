<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ButtonBlink - Parámetros</title>
    <link rel="stylesheet" href="sParametros.css">
</head>
<body>
    <div class="parametros-container">
        <!-- Header -->
        <a href="menu.html" class="header-link">
            <header class="header">
                <img src="images/buttonBlinkLogo.png" alt="ButtonBlink Logo" class="logo">
                <h1 class="title">BUTTONBLINK</h1>
            </header>
        </a>

        <!-- Sala -->
        <div class="sala-box">
            <p class="sala-number">SALA #0001</p>
            <p class="sala-timer">10 SEGUNDOS PARA INICIAR PARTIDA</p>
        </div>

        <!-- Lista de Jugadores -->
        <div class="players-box">
            <ol class="players-list">
                <li>aaaa</li>
                <li>bbbb</li>
                <li>cccc</li>
                <li>dddd</li>
                <li>eeee</li>
            </ol>
        </div>

        <!-- Dificultad -->
        <div class="difficulty-container">
            <p class="difficulty-title">DIFICULTAD</p>
            <div class="difficulty-levels">
                <div class="level">1</div>
                <div class="level">2</div>
                <div class="level">3</div>
                <div class="level">4</div>
            </div>
        </div>

        <!-- Botón Blink -->
        <a href="jugando.html" class="blink-btn">BLINK!</a>
    </div>
</body>
</html>
