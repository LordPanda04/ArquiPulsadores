<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ButtonBlink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="logo">
        <img src="images/buttonblinkLogo.jpg" alt="logo">
    </div>
    <div class="contenedor1">
    <p class="slogan">
        ¿Eres tan rápido como crees?
    </p>
    </div>
    <div class="contenedor2">
        <input type="text" id="nombreInput" placeholder="NOMBRE"><br>
        <input type="text" placeholder="N° SALA"><br>
        <input type="text" placeholder="N° PLACA"><br>    
    </div>
    <div class="botonPagina">
        <a href="parametros.html" class="button" onclick="guardarNombre()">INGRESAR</a>    
    </div>


    <script>
        // Función temporal para la prueba, eliminar después
        // Función para guardar el nombre en localStorage
        function guardarNombre() {
            var nombre = document.getElementById("nombreInput").value;
            if (nombre) {  // Si hay un nombre, lo guardamos en localStorage
                localStorage.setItem("nombre", nombre);
            }
        }
    </script>
</body>
</html>
