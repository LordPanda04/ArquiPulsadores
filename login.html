<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="sLogin.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="images/buttonBlinkLogo.png" alt="Logo">
        </div>
        <h1 class="welcome-text">¿Juegas de nuevo?</h1>
        <p class="subtitle">¡Ingresa tus datos!</p>

        <form class="login-form">
            <input type="email" id="email" class="input-field" placeholder="Usuario" required>
            <div class="password-container">
                <input type="password" id="password" class="input-field" placeholder="Contraseña" required>
                <span class="show-password">👁️</span>
            </div>
        
            <a href="menu.html" class="btn login-btn">Ingresar</a>
            <a href="parametros.html" class="btn invitado-btn">Ingresar como invitado</a>
            <a href="index.html" class="btn return-btn">Regresar al menú</a>
        </form>
        

        <p class="signup-text">
            ¿Aun sin cuenta? <a href="#">Registrate aquí</a>
        </p>
    </div>
</body>
</html>
